<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ServiceRadar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">ServiceRadar</div>
      <div class="logo-sub">Real-time service monitoring</div>
    </div>
  </div>
  <div class="live-badge">
    <div class="dot"></div>
    Live — refreshes every 30s
  </div>
</header>
<nav>
  <div class="tab active" onclick="switchTab('services', this)">Services</div>
  <div class="tab" onclick="switchTab('incidents', this)">Incidents</div>
</nav>
<main>
  <div class="metrics">
    <div class="metric"><div class="metric-label">Total services</div><div class="metric-value" id="total-services">—</div></div>
    <div class="metric"><div class="metric-label">Healthy</div><div class="metric-value green" id="healthy-count">—</div></div>
    <div class="metric"><div class="metric-label">Down</div><div class="metric-value red" id="down-count">—</div></div>
    <div class="metric"><div class="metric-label">Total incidents</div><div class="metric-value" id="total-incidents">—</div></div>
  </div>
  <div id="services-section" class="section active">
    <div class="section-header">
      <div class="section-title">Monitored services</div>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>Name</th><th>URL</th><th>Developer</th><th>Email</th><th>Added</th></tr></thead>
        <tbody id="services-body"><tr><td colspan="5" class="loading">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
  <div id="incidents-section" class="section">
    <div class="section-header">
      <div class="section-title">Incident history</div>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>Service</th><th>Status</th><th>Error message</th><th>Time</th></tr></thead>
        <tbody id="incidents-body"><tr><td colspan="4" class="loading">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</main>
<script src="app.js"></script>
</body>
</html>
