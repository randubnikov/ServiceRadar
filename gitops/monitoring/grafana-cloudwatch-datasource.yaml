apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-cloudwatch-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  cloudwatch-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: CloudWatch
        type: cloudwatch
        uid: cloudwatch
        jsonData:
          authType: default
          defaultRegion: us-east-1
