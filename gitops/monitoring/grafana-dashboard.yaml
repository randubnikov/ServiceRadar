apiVersion: v1
kind: ConfigMap
metadata:
  name: monitor-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  monitor-dashboard.json: |
    {
      "title": "ServiceRadar",
      "uid": "serviceradar-v2",
      "schemaVersion": 37,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Services Healthy",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "datasource": {"type": "cloudwatch", "uid": "cloudwatch"},
          "options": {"colorMode": "background", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "fieldConfig": {"defaults": {"color": {"fixedColor": "green", "mode": "fixed"}}},
          "targets": [{
            "refId": "A",
            "region": "us-east-1",
            "namespace": "AWS/Route53",
            "metricName": "HealthCheckStatus",
            "statistic": "Minimum",
            "period": "60",
            "matchExact": false,
            "metricQueryType": 1,
            "expression": "SELECT COUNT(HealthCheckStatus) FROM \"AWS/Route53\" WHERE HealthCheckStatus > 0"
          }]
        },
        {
          "id": 2,
          "title": "Services DOWN",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "datasource": {"type": "cloudwatch", "uid": "cloudwatch"},
          "options": {"colorMode": "background", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "fieldConfig": {"defaults": {"color": {"fixedColor": "red", "mode": "fixed"}}},
          "targets": [{
            "refId": "A",
            "region": "us-east-1",
            "namespace": "AWS/Route53",
            "metricName": "HealthCheckStatus",
            "statistic": "Minimum",
            "period": "60",
            "metricQueryType": 1,
            "expression": "SELECT COUNT(HealthCheckStatus) FROM \"AWS/Route53\" WHERE HealthCheckStatus = 0"
          }]
        },
        {
          "id": 3,
          "title": "Lambda Errors (last 1h)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "datasource": {"type": "cloudwatch", "uid": "cloudwatch"},
          "options": {"colorMode": "background", "reduceOptions": {"calcs": ["sum"]}},
          "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "green", "value": 0}, {"color": "red", "value": 1}]}, "color": {"mode": "thresholds"}}},
          "targets": [{
            "refId": "A",
            "region": "us-east-1",
            "namespace": "AWS/Lambda",
            "metricName": "Errors",
            "dimensions": {"FunctionName": "staging-incident-handler"},
            "statistic": "Sum",
            "period": "3600"
          }]
        },
        {
          "id": 4,
          "title": "Failed Alerts in DLQ",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "datasource": {"type": "cloudwatch", "uid": "cloudwatch"},
          "options": {"colorMode": "background", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "green", "value": 0}, {"color": "red", "value": 1}]}, "color": {"mode": "thresholds"}}},
          "targets": [{
            "refId": "A",
            "region": "us-east-1",
            "namespace": "AWS/SQS",
            "metricName": "ApproximateNumberOfMessagesVisible",
            "dimensions": {"QueueName": "staging-incident-handler-dlq"},
            "statistic": "Maximum",
            "period": "60"
          }]
        },
        {
          "id": 5,
          "title": "Route53 Health Check Status",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 4},
          "datasource": {"type": "cloudwatch", "uid": "cloudwatch"},
          "fieldConfig": {"defaults": {"min": 0, "max": 1, "thresholds": {"steps": [{"color": "red", "value": 0}, {"color": "green", "value": 1}]}}},
          "targets": [{
            "refId": "A",
            "region": "us-east-1",
            "namespace": "AWS/Route53",
            "metricName": "HealthCheckStatus",
            "matchExact": false,
            "statistic": "Minimum",
            "period": "60"
          }]
        },
        {
          "id": 6,
          "title": "Pod CPU Usage — staging namespace",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "refId": "A",
            "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"staging\", container!=\"\"}[5m])) by (pod)",
            "legendFormat": "{{pod}}"
          }]
        },
        {
          "id": 7,
          "title": "Pod Memory Usage — staging namespace",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "bytes"}},
          "targets": [{
            "refId": "A",
            "expr": "sum(container_memory_usage_bytes{namespace=\"staging\", container!=\"\"}) by (pod)",
            "legendFormat": "{{pod}}"
          }]
        },
        {
          "id": 8,
          "title": "Node CPU Usage",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "percentunit"}},
          "targets": [{
            "refId": "A",
            "expr": "1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) by (node)",
            "legendFormat": "{{node}}"
          }]
        },
        {
          "id": 9,
          "title": "Node Memory Usage",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "bytes"}},
          "targets": [{
            "refId": "A",
            "expr": "node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes",
            "legendFormat": "{{instance}}"
          }]
        }
      ]
    }
