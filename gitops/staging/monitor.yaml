apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitor-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/randubnikov/final-project
    targetRevision: main
    path: helm/monitor
    helm:
      valueFiles:
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true